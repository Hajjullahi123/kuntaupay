services:
  - type: web
    name: kuntau-pay
    runtime: node
    buildCommand: npm run web:build
    startCommand: npx prisma db push --schema=server/prisma/schema.prisma && node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kuntau-pay-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: kuntau-pay-db
    plan: free
